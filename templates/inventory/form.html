{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="d-flex align-items-center mb-4">
            <a href="/inventory" class="btn btn-light rounded-circle me-3 border-0"><i class="fa-solid fa-arrow-left"></i></a>
            <h2 class="fw-bold text-brand-black mb-0">{% if producto %}Editar Producto{% else %}Crear Producto{% endif %}</h2>
        </div>

        <div class="card card-custom p-5 border-0 shadow-sm">
            <form method="POST" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <!-- Enviar precio mínimo en 0 siempre por compatibilidad del backend -->
                <input type="hidden" name="precio_minimo" value="0"/>
                
                <div class="row g-4">
                    <div class="col-md-4">
                        <label class="form-label fw-bold text-brand-black">SKU</label>
                        <input type="text" class="form-control bg-light border-0" name="sku" required placeholder="Ej: HD-001" value="{{ producto.sku if producto else '' }}">
                    </div>
                    <div class="col-md-8">
                        <label class="form-label fw-bold text-brand-black">Nombre del Producto</label>
                        <input type="text" class="form-control bg-light border-0" name="nombre" required placeholder="Ej: Hot Dog Sencillo" value="{{ producto.nombre if producto else '' }}">
                    </div>
                    
                    <div class="col-md-12 mt-4">
                        <label class="form-label fw-bold text-brand-black">Tipo</label>
                        <select class="form-select bg-light border-0" name="tipo_producto" id="tipoProducto" required>
                            <option value="producto_final" {% if producto and producto.tipo_producto == 'producto_final' %}selected{% endif %}>Menú POS</option>
                            <option value="insumo" {% if producto and producto.tipo_producto == 'insumo' %}selected{% endif %}>Materia Prima</option>
                        </select>
                    </div>

                    <div class="col-md-4 mt-4">
                        <label class="form-label fw-bold text-brand-black text-truncate">Existencias</label>
                        <input type="number" class="form-control bg-light border-0" name="cantidad_stock" min="0" value="{{ producto.cantidad_stock if producto else '0' }}">
                    </div>
                    
                    <div class="col-md-8 mt-4" id="divCosto">
                        <label class="form-label fw-bold text-brand-black text-truncate">Costo</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-0">$</span>
                            <input type="number" step="1" class="form-control bg-light border-0" name="precio_costo" value="{{ "%.0f"|format(producto.precio_costo|float) if producto else '0' }}">
                        </div>
                    </div>
                    
                    <div class="col-md-8 mt-4" id="divPrecio">
                        <label class="form-label fw-bold text-brand-black text-truncate">Precio</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-0">$</span>
                            <input type="number" step="1" class="form-control bg-light border-0" name="precio_sugerido" value="{{ "%.0f"|format(producto.precio_sugerido|float) if producto else '0' }}">
                        </div>
                    </div>
                </div>

                <hr class="my-5 border-light">
                
                <div class="text-end">
                    <a href="/inventory" class="btn btn-link text-muted text-decoration-none fw-bold me-3">Cancelar</a>
                    <button type="submit" class="btn btn-yellow px-5 py-2 rounded-pill shadow-sm fw-bold">
                        Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const tipoSelect = document.getElementById('tipoProducto');
    const divCosto = document.getElementById('divCosto');
    const divPrecio = document.getElementById('divPrecio');

    function toggleCostoPrecio() {
        if (tipoSelect.value === 'insumo') {
            divCosto.classList.remove('d-none');
            divPrecio.classList.add('d-none');
        } else {
            divCosto.classList.add('d-none');
            divPrecio.classList.remove('d-none');
        }
    }

    tipoSelect.addEventListener('change', toggleCostoPrecio);
    toggleCostoPrecio(); // Llamada inicial para setear la vista correcta
});
</script>
{% endblock %}
