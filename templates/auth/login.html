{% extends "base.html" %}

{% block content %}
<style>
    /* Fondo limpio que mantiene la legibilidad */
    body {
        background-color: var(--brand-bg) !important;
        background-image: linear-gradient(135deg, var(--brand-bg) 0%, #eef3f5 100%);
    }

    /* Opcional: Ocultar la barra solo en login */
    .navbar-custom {
        display: none !important;
    }
</style>

<div class="row align-items-center justify-content-evenly" style="min-height: 85vh;">
    <!-- Columna Izquierda: Cuadro de Acceso Segregado -->
    <div class="col-md-6 col-lg-5 mb-4">
        <div class="card card-custom p-5 border-0 shadow-lg rounded-4" style="background-color: white; border-top: 5px solid var(--brand-yellow) !important;">
            <div class="text-center mb-5">
                <!-- Logo visible solo en móviles (la columna derecha se oculta) -->
                <img src="{{ url_for('static', filename='img/logo.jpg') }}" alt="Logo El Goldy" class="d-md-none mb-4" style="height: 120px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">
                <h3 class="fw-bold text-brand-black">Acceso al Panel</h3>
                <p class="text-muted">Introduce tus credenciales operativas</p>
            </div>
            
            <form method="POST" action="/auth/login">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div class="mb-4">
                    <label class="form-label fw-bold text-brand-black">Correo Electrónico</label>
                    <input type="email" class="form-control form-control-lg bg-light border-0" name="email" required placeholder="tu@elgoldy.com">
                </div>
                
                <div class="mb-5">
                    <label class="form-label fw-bold text-brand-black">Contraseña</label>
                    <input type="password" class="form-control form-control-lg bg-light border-0" name="password" required placeholder="••••••••">
                </div>
                
                <div class="d-grid">
                    <button type="submit" class="btn btn-yellow btn-lg rounded-pill shadow-sm">
                        Ingresar <i class="fa-solid fa-arrow-right ms-2"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Columna Derecha: Logo Central y Limpio -->
    <div class="col-md-6 col-lg-6 d-none d-md-flex justify-content-center align-items-center text-center">
        <!-- Logo a la altura del usuario sin solapamiento -->
        <div class="d-flex flex-column justify-content-center align-items-center h-100 text-center text-brand-black p-5">
            <img src="{{ url_for('static', filename='img/logo.jpg') }}" alt="Logo El Goldy" class="mb-4" style="max-width: 80%; height: auto; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.4);">
            <p class="lead fw-bold" style="color: var(--brand-black);">Sistema Integrado de Ventas y Gestión Operativa</p>
        </div>
    </div>
</div>
{% endblock %}
