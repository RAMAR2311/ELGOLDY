{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-brand-black m-0">{% if celular %}Editar Modelo de Celular{% else %}Registrar Modelo de Celular{% endif %}</h2>
            <a href="{{ url_for('celulares_bp.inventario') }}" class="btn btn-light rounded-pill px-4 shadow-sm border">
                <i class="fa-solid fa-arrow-left me-1"></i> Volver
            </a>
        </div>

        <div class="card card-custom border-0 shadow-sm p-4">
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <h5 class="fw-bold mb-3 border-bottom pb-2">Información General del Modelo</h5>
                
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Marca</label>
                        <input type="text" name="marca" class="form-control" value="{{ celular.marca if celular else '' }}" placeholder="Ej: Apple" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Modelo</label>
                        <input type="text" name="modelo_celular" class="form-control" value="{{ celular.modelo_celular if celular else '' }}" placeholder="Ej: iPhone 13 Pro" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Color Principal (Opcional)</label>
                        <!-- Se asume que el color se guardará en observacion del producto base, o se puede no pedir -->
                        <input type="text" name="color" class="form-control" placeholder="Ej: Negro" value="{{ request.args.get('color', '') }}">
                    </div>
                </div>

                <!-- Campos de precios base (antes conocidos como "Por Defecto") -->
                <h5 class="fw-bold mb-3 mt-4 border-bottom pb-2">Precios del Modelo</h5>
                
                <div class="row bg-light rounded-3 p-3 mx-0 border mb-4">
                    <div class="col-md-4 mb-2 mb-md-0">
                        <label class="form-label text-muted fw-bold small mb-1">Costo ($)</label>
                        <input type="text" name="precio_costo" class="form-control" value="{{ "%.0f"|format(celular.precio_costo|float) if celular and celular.precio_costo else '0' }}" oninput="formatInputCOP(this)" required>
                    </div>
                    <div class="col-md-4 mb-2 mb-md-0">
                        <label class="form-label text-success fw-bold small mb-1">Sugerido ($)</label>
                        <input type="text" name="precio_sugerido" class="form-control" value="{{ "%.0f"|format(celular.precio_sugerido|float) if celular and celular.precio_sugerido else '0' }}" oninput="formatInputCOP(this)" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label text-danger fw-bold small mb-1">Mínimo ($)</label>
                        <input type="text" name="precio_minimo" class="form-control" value="{{ "%.0f"|format(celular.precio_minimo|float) if celular and celular.precio_minimo else '0' }}" oninput="formatInputCOP(this)" required>
                    </div>
                </div>

                <div class="text-end">
                    <button type="submit" class="btn btn-blue rounded-pill px-5 fw-bold shadow-sm">
                        <i class="fa-solid fa-save me-1"></i> {% if celular %}Actualizar Modelo{% else %}Guardar Modelo y Continuar{% endif %}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
